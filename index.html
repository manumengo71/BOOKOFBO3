<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="BOOKOFBO3 — Futuristic military arcade slot machine. Virtual credits only. No real gambling.">
    <title>BOOKOFBO3 // COMBAT SLOT TERMINAL</title>

    <!-- CSS -->
    <link rel="stylesheet" href="src/css/main.css">
    <link rel="stylesheet" href="src/css/animations.css">
    <link rel="stylesheet" href="src/css/ui.css">

    <!-- PeerJS CDN for multiplayer -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>

<body>

    <!-- ── Loading Screen ─────────────────────────────────────── -->
    <div id="loading-screen">
        <div class="loading-logo">BOOKOFBO3</div>
        <div class="loading-sub">Combat Slot Terminal // Initializing...</div>
        <div class="loading-bar-track">
            <div id="loading-bar-fill"></div>
        </div>
        <div class="loading-status">LOADING COMBAT MODULES...</div>
    </div>

    <!-- ── Glitch FX overlay ──────────────────────────────────── -->
    <div id="glitch-overlay"></div>

    <!-- ── Dashboard ─────────────────────────────────────────── -->
    <div class="dashboard">

        <!-- Header spans full width -->
        <div id="slot-header" style="margin-bottom: 16px;"></div>

        <!-- 3-column grid layout -->
        <div class="dashboard-grid">

            <!-- Left column: Stats + Leaderboard -->
            <div class="col-left">
                <div id="slot-controls"></div>
                <div id="slot-leaderboard"></div>
            </div>

            <!-- Center column: Main game reels -->
            <div class="col-center">
                <div id="slot-game"></div>
            </div>

            <!-- Right column: Multiplayer -->
            <div class="col-right">
                <div id="slot-multiplayer"></div>
            </div>

        </div>
    </div>

    <!-- ── App Entry ──────────────────────────────────────────── -->
    <script type="module" src="src/js/app.js"></script>
</body>

</html>
